services:
  db:
    image: postgres:15.17
    container_name: marathon-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: health_marathon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health_marathon"]
      interval: 5s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase:v0.50.26
    container_name: marathon-metabase
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:3000"
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  metabase-data:
